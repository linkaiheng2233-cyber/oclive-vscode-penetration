name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  penetration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oclive-vscode-penetration
    steps:
      - uses: actions/checkout@v4
        with:
          path: oclive-vscode-penetration
      - uses: actions/checkout@v4
        with:
          repository: linkaiheng2233-cyber/oclive-vscode-host
          path: oclive-vscode-host
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: oclive-vscode-penetration/package-lock.json
      - name: Build @oclive/vscode-host
        run: cd ../oclive-vscode-host && npm ci && npm run build
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
