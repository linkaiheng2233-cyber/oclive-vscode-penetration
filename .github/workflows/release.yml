name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: linkaiheng2233-cyber/oclive-vscode-host
          path: ../oclive-vscode-host
          ref: main
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Build @oclive/vscode-host
        run: |
          if [ -d ../oclive-vscode-host ]; then
            cd ../oclive-vscode-host && npm ci && npm run build
          fi
      - run: npm ci
      - run: npm run package
      - name: Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
