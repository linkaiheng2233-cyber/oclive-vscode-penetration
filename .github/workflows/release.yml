name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vsix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oclive-vscode-penetration
    steps:
      - uses: actions/checkout@v4
        with:
          path: oclive-vscode-penetration
      - uses: actions/checkout@v4
        with:
          repository: linkaiheng2233-cyber/oclive-vscode-host
          path: oclive-vscode-host
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: oclive-vscode-penetration/package-lock.json
      - name: Build and pack @oclive/vscode-host
        run: |
          cd ../oclive-vscode-host && npm ci && npm run build && npm pack
      - name: Install host API tarball (avoid symlink in VSIX)
        run: npm install ../oclive-vscode-host/oclive-vscode-host-0.1.0.tgz
      - run: npm run package
      - name: Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: oclive-vscode-penetration/*.vsix
          generate_release_notes: true
