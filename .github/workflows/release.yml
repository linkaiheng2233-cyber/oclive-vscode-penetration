name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vsix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oclive-vscode-penetration
    steps:
      - uses: actions/checkout@v4
        with:
          path: oclive-vscode-penetration
      - uses: actions/checkout@v4
        with:
          repository: linkaiheng2233-cyber/oclive-vscode-host
          path: oclive-vscode-host
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: oclive-vscode-penetration/package-lock.json
      - name: Build @oclive/vscode-host
        run: cd ../oclive-vscode-host && npm ci && npm run build
      - run: npm ci
      - run: npm run package
      - name: Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: oclive-vscode-penetration/*.vsix
          generate_release_notes: true
